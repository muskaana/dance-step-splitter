# fly.toml app configuration file generated for dance-step-splitter on 2026-05-20T13:07:39-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dance-step-splitter'
primary_region = 'sjc'

[build]

[env]
  PORT = '8000'

[[mounts]]
  source = 'dss_data'
  destination = '/persistent'
  initial_size = '1gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
